<?xml version="1.0" encoding="UTF-8"?>
<!--
  RimeConfigurator ·  {ˇMnh
  Concept: candidate window (	y) + configuration  core UI of the app.
  Export to PNG/ICNS via Xcode Asset Catalog or iconutil for Dock icon.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2f2824"/>
      <stop offset="100%" stop-color="#1a1614"/>
    </linearGradient>
    <linearGradient id="pillHi" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0c06a"/>
      <stop offset="100%" stop-color="#c4853a"/>
    </linearGradient>
    <linearGradient id="pillLo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a423c"/>
      <stop offset="100%" stop-color="#35302c"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="b"/>
      <feOffset dx="0" dy="4" in="b" result="o"/>
      <feMerge>
        <feMergeNode in="o"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Squircle (macOS icon mask uses ~22% corner radius of square) -->
  <rect width="1024" height="1024" rx="230" fill="url(#bg)"/>
  <!-- Outer vignette -->
  <rect width="1024" height="1024" rx="230" fill="none" stroke="#000" stroke-opacity="0.25" stroke-width="2"/>
  <!-- Candidate bar group: centered -->
  <g transform="translate(512 512)" filter="url(#soft)">
    <!-- Left pill (dim) -->
    <rect x="-320" y="-72" width="200" height="144" rx="72" fill="url(#pillLo)"/>
    <!-- Center pill (highlight / selected candidate) -->
    <rect x="-100" y="-80" width="200" height="160" rx="80" fill="url(#pillHi)"/>
    <!-- Right pill (dim) -->
    <rect x="120" y="-72" width="200" height="144" rx="72" fill="url(#pillLo)"/>
    <!-- Config ticks (slider metaphor) on right -->
    <g fill="#8a7f72" opacity="0.9">
      <rect x="278" y="-48" width="8" height="8" rx="2"/>
      <rect x="278" y="-8" width="8" height="8" rx="2"/>
      <rect x="278" y="32" width="8" height="8" rx="2"/>
    </g>
    <!-- Label dots 1 · 2 · 3 -->
    <circle cx="-220" cy="0" r="14" fill="#5c534c"/>
    <circle cx="0" cy="0" r="16" fill="#fff" fill-opacity="0.35"/>
    <circle cx="220" cy="0" r="14" fill="#5c534c"/>
  </g>
</svg>
